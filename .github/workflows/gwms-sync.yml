name: GWMS Sync

on:
  # Cron foi movido para cron-job.org (GitHub Actions schedule atrasa 1-2h em horário de pico).
  # Trigger externo: https://console.cron-job.org → POST /actions/workflows/gwms-sync.yml/dispatches
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Validar secrets obrigatórios
        env:
          GH_REPO:   ${{ secrets.GH_REPO }}
          GWMS_USER: ${{ secrets.GWMS_USER }}
          GWMS_PASS: ${{ secrets.GWMS_PASS }}
        run: |
          MISSING=""
          [ -z "$GH_REPO" ]   && MISSING="$MISSING GH_REPO"
          [ -z "$GWMS_USER" ] && MISSING="$MISSING GWMS_USER"
          [ -z "$GWMS_PASS" ] && MISSING="$MISSING GWMS_PASS"
          if [ -n "$MISSING" ]; then
            echo "ERRO: secrets ausentes:$MISSING"
            exit 1
          fi
          echo "Secrets presentes. OK"

      - name: Puxar dados GWMS (silenciosos + triagem + reaberturas + utilização)
        env:
          GWMS_USER:    ${{ secrets.GWMS_USER }}
          GWMS_PASS:    ${{ secrets.GWMS_PASS }}
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO:      ${{ secrets.GH_REPO }}
        run: python scripts/gwms_sync.py
